# keel release verification — on a pushed v* tag, independently re-verify that
# the tag resolves anonymously through the default Go toolchain from a clean
# module cache. The tag + GitHub release are cut by `keel-dev release` (run by
# the operator); this workflow is the mechanical post-tag proof.
#
# DHF-REQ: keel/requirement-9, keel/requirement-10
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: verify anonymous fetch of the tag
        run: go run ./cmd/keel-dev verify "${GITHUB_REF_NAME}"
